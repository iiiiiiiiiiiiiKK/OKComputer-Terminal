<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>okcomputer-app</title>
    <script type="module" crossorigin src="/assets/index-DMzIBGps.js?v=20260307ax"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-rR2Ka2nL.css?v=20260307ax">
    <style>
      html,body{height:auto!important;min-height:100%;overflow-y:auto!important;-webkit-overflow-scrolling:touch}
      #root>div{height:auto!important;min-height:100vh!important;overflow:visible!important}
      main.flex-1.overflow-y-auto{flex:0 0 auto!important;overflow:visible!important;min-height:auto!important}
      #data-health-badge{font:10px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;color:#1a1a1a;padding-top:2px;white-space:nowrap;overflow-x:auto}
      #data-health-badge .ok{color:#198754} #data-health-badge .warn{color:#fd7e14} #data-health-badge .err{color:#dc3545}
      .row-flash{animation:rowFlash 0.6s ease-out}
      #macro-board{overflow:hidden;border:1px dashed #dee2e6;padding:6px 0;margin:0 0 12px 0;font:11px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:nowrap}
      #macro-track{display:inline-flex;gap:18px;white-space:nowrap;width:max-content;will-change:transform}
      #mini-kline{position:fixed;right:12px;bottom:58px;z-index:1201;min-width:180px;max-width:220px;padding:8px 10px;border:1px solid #dee2e6;background:rgba(248,249,250,.96);font:11px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;box-shadow:0 4px 16px rgba(0,0,0,.08)}
      #mini-kline svg{display:block;width:100%;height:72px}
      #thermo-block{border:1px dashed #dee2e6;padding:10px 12px;margin:0 0 12px 0;font:12px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace}
      #thermo-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
      #thermo-screen{display:none;border:1px solid #dee2e6;padding:2px 8px;font-size:10px;cursor:pointer}
      #thermo-body{display:none;margin-top:10px}
      #thermo-grid{display:grid;grid-template-columns:repeat(16,minmax(0,1fr));grid-auto-rows:18px;gap:4px}
      .thermo-cell{padding:4px;border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;justify-content:center;align-items:center;overflow:hidden;border-radius:3px;text-align:center}
      .thermo-ticker{font-weight:700;font-size:12px}.thermo-name{font-size:9px;opacity:.78;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.thermo-chg{font-size:11px;font-weight:700}
      .macro-up{color:#198754}.macro-down{color:#dc3545}.macro-flat{color:#6c757d}
      @keyframes rowFlash{0%{opacity:1;background:rgba(25,135,84,0.2)}50%{opacity:0.7}100%{opacity:1;background:transparent}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
    (function(){
      const fmt=(n)=>Number.isFinite(n)?n:'-';
      const el=document.createElement('div');
      el.id='data-health-badge';
      el.innerHTML='DATA: init...';
      document.body.appendChild(el);
      
      // 在 EXECUTE_AI_INSIGHT 上方添加滚动数值板块
      function ensureMacroBoard(){
        var root=document.getElementById('root');
        var app=root&&root.firstElementChild;
        if(!app||document.getElementById('macro-board')) return;
        var target=app.children[4];
        if(!target) return;
        var board=document.createElement('div');
        board.id='macro-board';
        board.innerHTML='<div id="macro-track">LOADING...</div>';
        app.insertBefore(board,target);
      }
      var macroPos=0,macroTimer=null;
      function startMacroScroll(){
        var board=document.getElementById('macro-board');
        var track=document.getElementById('macro-track');
        if(!board||!track) return;
        if(macroTimer) clearInterval(macroTimer);
        macroTimer=setInterval(function(){
          var half=track.scrollWidth/2;
          macroPos+=1.1;
          if(macroPos>=half) macroPos=0;
          track.style.transform='translateX(' + (-macroPos) + 'px)';
        },30);
      }
      function getFavTickers(){
        try{
          var favs=JSON.parse(localStorage.getItem('ok_cmd_favs_v38')||'[]');
          var data=JSON.parse(localStorage.getItem('ok_cmd_data_v38')||'[]');
          if(!Array.isArray(favs)||!Array.isArray(data)) return [];
          var favSet={}; favs.forEach(function(x){favSet[x]=1;});
          return data.filter(function(x){return favSet[x.id];}).map(function(x){return x.ticker;}).filter(Boolean);
        }catch(e){ return []; }
      }
      async function refreshMacroBoard(){
        try{
          ensureMacroBoard();
          var board=document.getElementById('macro-board');
          var track=document.getElementById('macro-track');
          if(!board||!track) return;
          var tickers=getFavTickers();
          if(!tickers.length){
            board.style.display='none';
            if(macroTimer) clearInterval(macroTimer);
            return;
          }
          board.style.display='block';
          var r=await fetch('/api/quote?symbols='+encodeURIComponent(tickers.join(',')),{cache:'no-store'});
          var d=await r.json();
          if(!Array.isArray(d)||!d.length) return;
          var html=d.filter(function(x){return x&&x.ticker&&typeof x.price!=='undefined';}).map(function(x){
            var chg=parseFloat(x.chg||0),cls=chg>0?'macro-up':(chg<0?'macro-down':'macro-flat');
            var arrow=chg>0?'↑':(chg<0?'↓':'→');
            var price=(typeof x.price==='number')?x.price.toFixed(2):x.price;
            return '<span><b>'+x.ticker+'</b> <span class="'+cls+'">'+price+' '+arrow+Math.abs(chg).toFixed(2)+'%</span></span>';
          }).join('<span style="opacity:.35"> | </span>');
          if(!html){ board.style.display='none'; return; }
          track.innerHTML=html+'<span style="opacity:.35"> | </span>'+html;
          macroPos=0;
          track.style.transform='translateX(0px)';
          startMacroScroll();
        }catch(e){}
      }
      setTimeout(refreshMacroBoard,1200);
      setInterval(refreshMacroBoard,10000);

      // 读取URL参数
      var params=new URLSearchParams(window.location.search);
      if(params.get('filter')){
        var filter=params.get('filter');
        setTimeout(function(){
          var btns=[...document.querySelectorAll('button')];
          var btn=btns.find(function(b){return b.innerText&&b.innerText.includes('['+filter+']');});
          if(btn){btn.click();}
        },1500);
      }
      
      function ensureThermoBlock(){
        var root=document.getElementById('root');
        var app=root&&root.firstElementChild;
        if(!app||document.getElementById('thermo-block')) return;
        var target=app.children[4] || app.lastElementChild;
        var wrap=document.createElement('div');
        wrap.id='thermo-block';
        wrap.innerHTML=''
          +'<div id="thermo-head">'
          +'<span>>_MARKET_THERMOGRAM</span>'
          +'<button id="thermo-screen">Screen</button>'
          +'</div>'
          +'<div id="thermo-body"><div id="thermo-grid"></div></div>';
        app.insertBefore(wrap,target);
        document.getElementById('thermo-head').onclick=function(e){
          if(e.target&&e.target.id==='thermo-screen') return;
          var body=document.getElementById('thermo-body');
          var btn=document.getElementById('thermo-screen');
          var open=body.style.display==='block';
          body.style.display=open?'none':'block';
          btn.style.display=open?'none':'inline-block';
          if(!open) renderThermogram();
        };
        document.getElementById('thermo-screen').onclick=function(ev){
          ev.stopPropagation();
          // 弹窗选择
          var m=document.getElementById('thermo-modal');
          if(m){m.remove();}
          m=document.createElement('div');
          m.id='thermo-modal';
          m.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1999;display:flex;align-items:center;justify-content:center';
          m.innerHTML='<div style="background:#fff;border-radius:8px;padding:20px;min-width:240px;text-align:center;font:14px ui-monospace,SFMono">'+
            '<div style="margin-bottom:16px;font-weight:700">保存热力图</div>'+
            '<button id="tmb-album" style="display:block;width:100%;padding:10px;margin:8px 0;border:1px solid #dee2e6;background:#f8f9fa;border-radius:4px;cursor:pointer">📷 保存到相册</button>'+
            '<button id="tmb-file" style="display:block;width:100%;padding:10px;margin:8px 0;border:1px solid #dee2e6;background:#f8f9fa;border-radius:4px;cursor:pointer">💾 保存为文件</button>'+
            '<button id="tmb-cancel" style="display:block;width:100%;padding:10px;margin:8px 0;border:none;background:transparent;color:#666;cursor:pointer">取消</button>'+
            '</div>';
          document.body.appendChild(m);
          document.getElementById('tmb-cancel').onclick=function(){m.remove();};
          document.getElementById('tmb-file').onclick=function(){
            m.remove();
            try{
              var html='<!doctype html><html><meta name="viewport" content="width=device-width,initial-scale=1"><body style="margin:0;padding:16px;background:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace"><h3 style="margin:0 0 12px 0">MARKET THERMOGRAM</h3>'+document.querySelector('#thermo-grid').outerHTML+'</body></html>';
              var blob=new Blob([html],{type:'text/html'});
              var a=document.createElement('a');
              a.href=URL.createObjectURL(blob);
              a.download='market-thermogram.html';
              a.click();
              setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
            }catch(e){}
          };
          document.getElementById('tmb-album').onclick=function(){
            m.remove();
            // 尝试复制到剪贴板 (图片)
            try{
              alert('请长按页面截图保存到相册，或使用"保存为文件"');
            }catch(e){}
          };
        };
      }
      function currentThemeDark(){
        var txt=(document.body.innerText||'');
        return txt.includes('[ THEME ]');
      }
      function getCurrentFilterTickers(){
        try{
          var active=[].find.call(document.querySelectorAll('button'),function(b){
            return b.innerText.startsWith('[ ') && b.style.backgroundColor && b.style.backgroundColor!=='transparent';
          });
          var filter=active?active.innerText.replace(/\[|\]/g,'').trim():'';
          var data=JSON.parse(localStorage.getItem('ok_cmd_data_v38')||'[]');
          if(!Array.isArray(data)) return [];
          if(!filter||filter==='ALL_DATA') return data;
          if(filter==='FAVS'){
            var favs=JSON.parse(localStorage.getItem('ok_cmd_favs_v38')||'[]');
            var favSet={}; favs.forEach(function(x){favSet[x]=1;});
            return data.filter(function(x){return favSet[x.id];});
          }
          return data.filter(function(x){return x.category===filter;});
        }catch(e){ return []; }
      }
      async function renderThermogram(){
        try{
          ensureThermoBlock();
          var grid=document.getElementById('thermo-grid');
          if(!grid) return;
          var rows=getCurrentFilterTickers().slice(0,30);
          if(!rows.length){ grid.innerHTML='<div style="opacity:.6">No assets</div>'; return; }
          var symbols=rows.map(function(x){return x.ticker;}).filter(Boolean);
          var q=await fetch('/api/quote?symbols='+encodeURIComponent(symbols.join(',')),{cache:'no-store'}).then(function(r){return r.json();});
          var map={}; (q||[]).forEach(function(x){ if(x&&x.ticker) map[x.ticker]=x; });
          var ranked=rows.map(function(x){
            var m=map[x.ticker]||{}, chg=parseFloat(m.chg||x.chg||0), price=(typeof m.price==='number'?m.price:x.price);
            return {x:x, chg:chg, price:price, abs:Math.abs(chg)};
          }).sort(function(a,b){return b.abs-a.abs;});
          grid.innerHTML=ranked.map(function(it,idx){
            var x=it.x, chg=it.chg, price=it.price;
            var abs=Math.min(1,Math.abs(chg)/5);
            var base=chg>0?[25,135,84]:chg<0?[220,53,69]:[108,117,125];
            var alpha=chg===0?0.18:(0.22+abs*0.5);
            var bg='rgba('+base[0]+','+base[1]+','+base[2]+','+alpha+')';
            var color=chg>0?'#fff':(chg<0?'#fff':'#333');
            var cs=idx<3?5:(idx<12?4:3);
            var rs=idx<3?4:(idx<12?3:2);
            return '<div class="thermo-cell" style="background:'+bg+';grid-column:span '+cs+';grid-row:span '+rs+'">'
              +'<div class="thermo-ticker" style="font-size:'+(idx<3?'15':'11')+'px;color:'+color+'">'+x.ticker+'</div>'
              +'<div class="thermo-chg" style="font-size:'+(idx<3?'14':'10')+'px;color:'+color+'">'+(chg>0?'+':'')+chg.toFixed(1)+'%</div>'
              +'</div>';
          }).join('');
        }catch(e){}
      }
      setTimeout(ensureThermoBlock,1200);
      setTimeout(renderThermogram,2200);
      setInterval(function(){ if(document.getElementById('thermo-body')?.style.display==='block') renderThermogram(); },10000);

      // 点击涨跌幅显示 mini K 线
      async function showMiniKline(symbol){
        try{
          var old=document.getElementById('mini-kline'); if(old) old.remove();
          var box=document.createElement('div');
          box.id='mini-kline';
          box.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b>'+symbol+'</b><span style="cursor:pointer;opacity:.6" onclick="this.parentNode.parentNode.remove()">✕</span></div><div style="opacity:.7">Loading...</div>';
          document.body.appendChild(box);
          var r=await fetch('/api/chart?symbol='+encodeURIComponent(symbol),{cache:'no-store'});
          var d=await r.json();
          if(!d||!Array.isArray(d.data)||!d.data.length){ box.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b>'+symbol+'</b><span style="cursor:pointer;opacity:.6" onclick="this.parentNode.parentNode.remove()">✕</span></div><div style="opacity:.7">No chart data</div>'; return; }
          var vals=d.data.map(function(x){return x.c;});
          var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals), w=180, h=72;
          var pts=vals.map(function(v,i){ var x=i*(w/(vals.length-1||1)); var y=max===min ? h/2 : h-((v-min)/(max-min))*h; return x.toFixed(1)+','+y.toFixed(1); }).join(' ');
          var last=vals[vals.length-1], first=vals[0], up=last>=first;
          box.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b>'+symbol+'</b><span style="cursor:pointer;opacity:.6" onclick="this.parentNode.parentNode.remove()">✕</span></div>'+
            '<svg viewBox="0 0 '+w+' '+h+'"><polyline fill="none" stroke="'+(up?'#198754':'#dc3545')+'" stroke-width="2" points="'+pts+'" /></svg>'+
            '<div style="margin-top:6px;opacity:.8">7D · '+first.toFixed(2)+' → '+last.toFixed(2)+'</div>';
        }catch(e){}
      }
      function bindMiniKlineClicks(){
        document.querySelectorAll('main .col-span-3.text-right.font-bold').forEach(function(el){
          if(el.dataset.kbound) return;
          el.dataset.kbound='1';
          el.style.cursor='pointer';
          el.style.paddingRight='4px';
          var handler=function(ev){
            if(ev) ev.preventDefault();
            var row=el.closest('div.grid');
            var tickerEl=row&&row.querySelector('.col-span-5 .font-bold');
            var symbol=tickerEl&&tickerEl.innerText&&tickerEl.innerText.trim();
            if(symbol) showMiniKline(symbol);
          };
          el.onclick=handler;
          el.ontouchend=handler;
        });
      }

      // 数据健康角标
      async function tick(){
        var t0=Date.now();
        try{
          var r=await fetch('/api/market-data',{cache:'no-store'});
          var d=await r.json();
          var ms=Date.now()-t0;
          var total=d?d.length:0;
          var zero=d?d.filter(function(x){return Math.abs(parseFloat(x.changePercent24h||0))<0.005;}).length:0;
          var src=d&&d[0]&&d[0].source?d[0].source:'-';
          var ts=d&&d[0]&&d[0].ts?new Date(d[0].ts).toLocaleTimeString():new Date().toLocaleTimeString();
          var cls=total>0&&zero/Math.max(total,1)<0.3?'ok':(total>0?'warn':'err');
          el.innerHTML='DATA: <span class="'+cls+'">SRC:'+src+'</span> | COUNT:'+fmt(total)+' | ZERO:'+fmt(zero)+' | RTT:'+ms+'ms | TS:'+ts;
          setTimeout(function(){
            document.querySelectorAll('main div.grid>div').forEach(function(row){
              if(row.classList.contains('row-flash')){row.classList.remove('row-flash');}
              row.classList.add('row-flash');
            });
            bindMiniKlineClicks();
            // 切换分类后自动刷新热力图
            var act=document.querySelector('button[style*="background"]');
            var cat=act&&act.innerText.match(/\[(.*?)\]/);
            if(cat) renderThermogram(cat[1]);
          },100);
        }catch(e){
          el.innerHTML='<span class="err">DATA LINK ERROR</span>';
        }
      }
      tick();
      setInterval(tick,10000);
      

    })();
  </script>
  </body>
</html>
