<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OKComputer Terminal</title>
<style>
html,body{height:auto!important;min-height:100%;overflow-y:auto!important}
#root{min-height:100vh;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f8f9fa;color:#1a1a1a}
header{border:2px solid #dee2e6;padding:12px;margin-bottom:12px;background:#fff}
.header-row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.btn{border:1px solid #dee2e6;padding:4px 8px;cursor:pointer;background:#fff;font-size:12px;margin:2px}
.btn.active{background:#1a1a1a;color:#fff}
.stats{display:flex;gap:16px;font-size:12px;opacity:0.7;margin:8px 0}
.search-box{border:1px solid #dee2e6;padding:6px;margin:8px 0;width:100%;font-size:12px}
.list{grid-template-columns:1fr 2fr 1fr;gap:8px;padding:8px 0}
.row{display:grid;grid-template-columns:1fr 3fr 2fr 2fr;gap:8px;padding:8px 0;border-bottom:1px dashed #dee2epx;font-size:12px;align-items:center}
.row.up{color:#198754}.row.down{color:#dc3545}
#data-health{position:fixed;bottom:8px;right:8px;font-size:10px;opacity:0.7;background:rgba(255,255,255,0.9);padding:4px 8px;border:1px solid #dee2e6}
#thermo{margin-top:12px;padding:12px;border:1px dashed #dee2e6}
#thermo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.thermo-cell{padding:8px;text-align:center;font-size:11px;border-radius:4px}
</style>
</head>
<body>
<div id="root">
<header>
<div class="header-row">
<div style="font-size:14px;font-weight:bold">root@Marketlist:~$ ./terminal_Open</div>
<div style="display:flex;gap:4px;flex-wrap:wrap">
<button class="btn active" onclick="filter='ALL';render()">[ ALL ]</button>
<button class="btn" onclick="filter='FAVS';render()">[ FAVS ]</button>
<button class="btn" onclick="filter='BTC';render()">[ BTC ]</button>
<button class="btn" onclick="filter='FAANG';render()">[ FAANG ]</button>
<button class="btn" onclick="theme=theme==='light'?'dark':'light';render()">[ THEME ]</button>
</div>
</div>
<div class="stats">
<span>TOTAL: <b id="total">0</b></span>
<span>UP: <b id="up">0</b></span>
<span>DOWN: <b id="down">0</b></span>
</div>
<input class="search-box" placeholder="@oAdam" onkeyup="search=this.value;render()">
</header>
<main id="list"></main>
<div id="thermo"><div style="font-weight:bold;margin-bottom:8px">>_ MARKET THERMOGRAM</div><div id="thermo-grid"></div></div>
</div>
<div id="data-health">DATA: SRC:tradingview | COUNT:0 | TS:--:--:--</div>
<script>
var data=[],filter='ALL',search='',theme='light',favs=JSON.parse(localStorage.getItem('favs')||'[]');
var symbols=["SPY","QQQ","DIA","IWM","IWF","IWD","VTI","IVV","VOO","AAPL","MSFT","GOOGL","AMZN","NVDA","TSLA","META","BTC-USD","ETH-USD","SOL-USD","GC=F","CL=F","EURUSD=X","USDJPY=X","TNX","BITB","BITO","BITW","DEFI"];

function fetchData(){
  fetch('https://scanner.tradingview.com/america/scan',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      symbols:{tickers:symbols.map(s=>'AMEX:'+s)},
      query:{types:[]},
      columns:['close','change']
    })
  }).then(r=>r.json()).then(q=>{
    data=(q.data||[]).map(x=>{
      var p=x.s.split(':');
      return{symbol:p[1],price:x.d[0],chg:x.d[1]};
    });
    render();
    updateThermo();
    document.getElementById('data-health').innerHTML='DATA: SRC:tradingview | COUNT:'+data.length+' | TS:'+new Date().toLocaleTimeString();
  }).catch(e=>{
    document.getElementById('data-health').innerHTML='DATA: SRC:ERROR | COUNT:0';
  });
}
function render(){
  var list=document.getElementById('list');
  var f=data.filter(d=>{
    if(filter==='ALL')return true;
    if(filter==='FAVS')return favs.includes(d.symbol);
    if(filter==='BTC')return['BTC-USD','ETH-USD','SOL-USD','BITB','BITO','BITW','DEFI'].includes(d.symbol);
    if(filter==='FAANG')return['AAPL','MSFT','GOOGL','AMZN','NVDA','TSLA','META'].includes(d.symbol);
    return true;
  }).filter(d=>search?d.symbol.toLowerCase().includes(search.toLowerCase()):true);
  var up=f.filter(d=>d.chg>0).length;
  var down=f.filter(d=>d.chg<0).length;
  document.getElementById('total').innerText=f.length;
  document.getElementById('up').innerText=up;
  document.getElementById('down').innerText=down;
  list.innerHTML=f.map(d=>'<div class="row '+(d.chg>0?'up':d.chg<0?'down':'')+'"><div>'+d.symbol+'</div><div style="opacity:0.7">'+(d.symbol.length<5?'':d.symbol)+'</div><div style="text-align:right">$'+(d.price||'-')+'</div><div style="text-align:right;font-weight:bold">'+(d.chg>0?'+':'')+(d.chg||0).toFixed(2)+'%</div></div>').join('');
}
function updateThermo(){
  var grid=document.getElementById('thermo-grid');
  if(!data.length)return;
  var sorted=[...data].sort((a,b)=>Math.abs(b.chg)-Math.abs(a.chg));
  grid.innerHTML=sorted.slice(0,16).map(d=>{
    var bg=d.chg>0?'rgba(25,135,84,'+(0.2+Math.min(1,Math.abs(d.chg)/10)*0.6)+')':d.chg<0?'rgba(220,53,69,'+(0.2+Math.min(1,Math.abs(d.chg)/10)*0.6)+')':'rgba(108,117,125,0.2)';
    return'<div class="thermo-cell" style="background:'+bg+';color:#fff"><div style="font-weight:bold">'+d.symbol+'</div><div>'+(d.chg>0?'+':'')+d.chg.toFixed(1)+'%</div></div>';
  }).join('');
}
document.querySelectorAll('.btn').forEach(b=>b.onclick=function(){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  this.classList.add('active');
});
fetchData();
setInterval(fetchData,10000);
</script>
</body>
</html>
